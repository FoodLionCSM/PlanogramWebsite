<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <style>
        
    </style>

    <metacharset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Store Finder</title>
</head>

<body>

    <style>
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
    text-align: center;
    background: #ffffff;
    color: #1f2937;
  }

  .hero-card {
    background: #f3f4f6;
    border: 1px solid #d1d5db;
    border-radius: 16px;
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
    padding: 30px 28px;
    width: min(90%, 420px);
  }

  h1 {
    margin: 0 0 12px;
    color: #005A9C;
    font-size: 1.95rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-stretch: condensed;
    text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.75);
  }

  .search-box {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-top: 15px;
    flex-wrap: wrap;
    width: 100%;
  }

  #storeInput {
    padding: 11px 13px;
    font-weight: 500;
    width: 220px;
    max-width: 100%;
    box-sizing: border-box;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    outline: none;
    font-size: 0.98rem;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  #storeInput:focus {
    border-color: #005A9C;
    box-shadow: 0 0 0 2px rgba(0, 90, 156, 0.12);
  }

  button {
    padding: 11px 15px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background: #005A9C;
    color: white;
    font-weight: 600;
    transition: background 0.2s ease;
  }

  button:hover {
    background: #00467a;
  }

  @media (max-width: 480px) {
    body {
      padding: 20px 15px;
      box-sizing: border-box;
      justify-content: center;
    }

    .hero-card {
      width: min(92vw, 360px);
      padding: 24px 18px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    .search-box {
      flex-direction: column;
      gap: 8px;
      width: 100%;
      align-items: stretch;
      justify-content: center;
    }

    #storeInput,
    button {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }
  }

  img.bottom {
    position: fixed;   /* Stays at bottom of screen */
    bottom: 0;         /* Align to bottom */
    left: 50%;         /* Center horizontally */
    transform: translateX(-50%);
    width: 120px;       /* Smaller width */
    height: auto;      /* Keep aspect ratio */
    z-index: 9999;     /* Ensure it’s on top */
  }
</style>

<div class="hero-card">
    <h1>Store Finder</h1>

    <div class="search-box">
        <input id="storeInput" placeholder="Enter store number" inputmode="numeric" pattern="[0-9]*" oninput="handleStoreInput(this.value)" onkeydown="if(event.key === 'Enter'){ goToStore(); }">
        <button onclick="goToStore()">Search</button>
    </div>
</div>

<script src="script.js"></script>


<img src="./updatedFLGraphicPNG.png"
     alt="Bottom Image" 
     class="bottom">

</body>
</html>
