<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Store Viewer</title>
</head>
<body>
    <div class="page-shell">
        <div class="content-card">
            <h1 id="storeTitle"></h1>
            <p id="storeMessage" class="store-message"></p>
            <img id="storeImage" alt="Store image">
            <button onclick="goBack()">Back to Store Finder</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        background: #ffffff;
        color: #1f2937;
      }

      .page-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 16px 90px;
        box-sizing: border-box;
      }

      .content-card {
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        border-radius: 16px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
        padding: 24px;
        width: min(92%, 960px);
        text-align: center;
        position: relative;
      }

      h1 {
        margin: 0 0 16px;
        color: #005A9C;
        font-size: 1.8rem;
        font-weight: 700;
      }

      .store-message {
        margin: 0 0 16px;
        color: #111111;
        font-weight: 600;
        display: none;
      }

      #storeImage {
        display: block;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto 18px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
      }

      button {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 8px 12px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #005A9C;
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
        transition: background 0.2s ease;
      }

      button:hover {
        background: #00467a;
      }

      img.bottom {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: auto;
        z-index: 9999;
      }
    </style>

    
    <img src="./Images/updatedFLGraphicPNG.png"
         alt="Bottom Image"
         class="bottom">
</body>
</html>
